baseURL = 'https://your-site.netlify.app'
languageCode = 'en-us'
title = 'Smart Finance Guide'
theme = 'PaperMod'

[params]
  description = 'Expert insights on personal finance, insurance, and smart money decisions.'
  customHead = '<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-YOUR_PUBLISHER_ID" crossorigin="anonymous"></script>'
  
  # Disable profile mode to show posts on homepage
  homeInfoParams = false
  
  # Show posts on homepage
  mainSections = ["posts"]
  
  # Post settings
  ShowToc = true
  TocOpen = false
  ShowReadingTime = true
  ShowDate = true
  ShowLastModified = true

[markup.goldmark.renderer]
  unsafe = true

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Blog"
    url = "/posts/"
    weight = 10
  
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20
